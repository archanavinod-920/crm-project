<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='product.css') }}">
</head>
<body>
    <div class="sidebar">
        <a href="/prdthome">Home</a>
        <a href="/addproduct">Add Product</a>
        <a href="/viewproduct">View Products</a>
        <a href="/updateproduct">Update Product</a>
        <a href="/deleteproduct">Delete Product</a>
        <a href="/inventory">Inventory</a>
    </div>

    <div class="content">
        <h1>Inventory Status</h1>
        <table>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        {% for p in products %}
        <tr>
            <td>{{p[2]}}</td>
            <td>{{p[4]}}</td>
            <td>
                {% if p[4]|int==0 %}
                    Out Of Stock
                {% elif p[4]|int< 10 %}
                    Low Stock
                {% else %}
                    In Stock
                {% endif %}
            </td>
        </tr>
        {% endfor %}
        </table>
    </div>
</body>
</html>
