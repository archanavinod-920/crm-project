<!DOCTYPE html>
<html>
<head>
    <title>View Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='product.css') }}">
</head>
<body>
    <div class="sidebar">
        <a href="/prdthome">Home</a>
        <a href="/addproduct">Add Product</a>
        <a href="/viewproduct">View Products</a>
        <a href="/updateproduct">Update Product</a>
        <a href="/deleteproduct">Delete Product</a>
        <a href="/inventory">Inventory</a>
    </div>

    <div class="content">
        <h1>View Products</h1>
        <table>
        <tr>
            <th>ID</th>
            <th>Category</th>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>
        {% for p in products %}
        <tr>
            <td>{{p[0]}}</td>
            <td>{{p[1]}}</td>
            <td>{{p[2]}}</td>
            <td>{{p[3]}}</td>
            <td>{{p[4]}}</td>
        </tr>
        {% endfor %}
        </table>
    </div>
</body>
</html>
