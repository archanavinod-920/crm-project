<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="/static/prdtcategories.css">
</head>
<body>
    <div class="header">
        <a href="/customer_home"><button>← Home</button></a>
        <h1>Your Cart🛒 </h1>
        <h3>Review your selected beauty products🛍️</h3>
    </div>
    <div class="products">
        {% if cart|length == 0 %}
            <h2>Your cart feels empty</h2>
        {% else %}
            {% for item in cart %}
            <div class="card">
                <img src="{{ item.image }}">
                <h3>{{ item.name }}</h3>
                <p class="price">₹{{ item.price }}</p>
                <form action="/remove" method="post">
                    <input type="hidden" name="index" value="{{ loop.index0 }}">
                    <button>Remove</button>
                </form>
            </div>
            {% endfor %}
        {% endif %}
    </div>
    <div class="summary">
    <h3>Total Products:{{cart|length}}</h3>
    </div>
</body>
</html>
