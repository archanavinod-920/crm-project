<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cust_prof.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-icon">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>My Profile</h1>

        <div class="profile-info">
            <p><strong>Name:</strong> {{ customer[1] }}</p>
            <p><strong>Phone:</strong> {{ customer[2] }}</p>
            <p><strong>Email:</strong> {{ customer[3] }}</p>
            <p><strong>Date of Birth:</strong> {{ customer[4] }}</p>
            <p><strong>Gender:</strong> {{ customer[5] }}</p>
          <p><strong>Skin Type:</strong> {{ customer[6] }}</p>
        </div>

        <div class="btn-group">
            <a href="/edit_profile" class="edit-btn">Edit Profile</a>
            <a href="/customer_home" class="back-btn">Back</a>
        </div>

    </div>

</div>

</body>
</html>
